<body>

<div class="container-fluid py-3">

<!-- Registration Form -->

<div class="card shadow p-4 mb-4">

    <form id="vendorForm">

            </div>

            <div class="col-md-12 mb-3">

    <textarea
        class="form-control"
        id="companyAddress"
        rows="3"
        required>
    </textarea>
</div>
    
            <div class="col-12 col-md-6 mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="email" required>
            </div>
            <div class="col-12 col-md-6 mb-3">
    <label class="form-label">Mobile</label>
    <input
    type="tel"
    class="form-control"
    id="mobile"
    pattern="[0-9]{10}"
    maxlength="10"
    required>
</div>
            <div class="col-12 col-md-6 mb-3">
    <label class="form-label">Alternate Mobile Number</label>
    <input
    type="tel"
    class="form-control"
    id="alternateMobile"
    pattern="[0-9]{10}"
    maxlength="10"
    required>
</div>
            <div class="col-12 col-md-6 mb-3">
                <label class="form-label">PAN Number</label>
                <input type="text" class="form-control" id="pan" required>
            </div>

        type="file"
        class="form-control"
        id="panFile"

</div>

            <div class="col-12 col-md-6 mb-3">
                <label class="form-label">GST Number (Optional)</label>
                <input type="text" class="form-control" id="gst">
            </div>

            <div class="col-12 col-md-6 mb-3">
    <label class="form-label">GST Certificate Upload (Optional)</label>
    <input
        type="file"
        class="form-control"
        id="gstFile"
        accept=".pdf,.jpg,.jpeg,.png">
</div>

<div class="col-12 col-md-6 mb-3">

        Upload Signed Agreement / Contract
    </label>
    <input
        type="file"
        class="form-control"
        id="agreementFile"
        accept=".pdf,.jpg,.jpeg,.png"
        required>
</div>
<div class="col-12 col-md-6 mb-3">
    <label class="form-label">
        Date of Agreement
    </label>
    <input
        type="date"
        class="form-control"
        id="agreementDate"
        required>
</div>
<div class="col-12 col-md-6 mb-3">
    <label class="form-label">
        Validity of Agreement
    </label>

        id="agreementValidity"

        <option value="1 Year">1 Year</option>
        <option value="2 Years">2 Years</option>
        <option value="3 Years">3 Years</option>

    </select>
</div>

        </button>

        <ul class="dropdown-menu p-3 w-100">

                    <input class="form-check-input service-checkbox"

            </li>

            <li>
                <div class="form-check">
                    <input class="form-check-input service-checkbox"

                           value="Mobilization Partner"

                    <label class="form-check-label" for="service2">
                        Mobilization Partner
                    </label>
                </div>
            </li>

            <li>
                <div class="form-check">
                    <input class="form-check-input service-checkbox"
                           type="checkbox"
                           value="Infrastructure Rental"
                           id="service3">
                    <label class="form-check-label" for="service3">
                        Infrastructure Rental
                    </label>
                </div>
            </li>

            <li>
                <div class="form-check">
                    <input class="form-check-input service-checkbox"
                           type="checkbox"
                           value="Domain Trainer"
                           id="service4">
                    <label class="form-check-label" for="service4">
                        Domain Trainer
                    </label>
                </div>
            </li>

            <li>
                <div class="form-check">
                    <input class="form-check-input service-checkbox"
                           type="checkbox"
                           value="Softskill Trainer"
                           id="service5">
                    <label class="form-check-label" for="service5">
                        Softskill Trainer
                    </label>
                </div>
            </li>

            <li>
                <div class="form-check">
                    <input class="form-check-input service-checkbox"
                           type="checkbox"
                           value="Recruitment Partner"
                           id="service6">
                    <label class="form-check-label" for="service6">
                        Recruitment Partner
                    </label>
                </div>
            </li>

            <li>
                <div class="form-check">
                    <input class="form-check-input service-checkbox"
                           type="checkbox"
                           value="Contract Employers"
                           id="service7">
                    <label class="form-check-label" for="service7">
                        Contract Employers
                    </label>
                </div>
            </li>

            <li>
    <div class="form-check">
        <input class="form-check-input service-checkbox"
               type="checkbox"
               value="Others"
               id="service8">
        <label class="form-check-label" for="service8">
            Others
        </label>
    </div>
</li>

        </ul>

    </div>

</div>
        </div>
        <hr class="my-4">

<h5>Bank Details</h5>

<div class="row">

    <div class="col-12 col-md-6 mb-3">
        <label class="form-label">Bank Account Number</label>
        <input
    type="text"
    class="form-control"
    id="accountNumber"
    inputmode="numeric"
    maxlength="18"
    oninput="this.value=this.value.replace(/[^0-9]/g,'')"
    required>
    </div>

    <div class="col-12 col-md-6 mb-3">
        <label class="form-label">Account Holder Name</label>
        <input type="text" class="form-control" id="accountHolder" required>
    </div>

    <div class="col-12 col-md-6 mb-3">
        <label class="form-label">Bank Name</label>
        <input type="text" class="form-control" id="bankName" required>
    </div>

    <div class="col-12 col-md-6 mb-3">
        <label class="form-label">IFSC Code</label>
        <input type="text" class="form-control" id="ifsc" required>
    </div>

</div>

        <button type="submit" class="btn btn-primary">
            Register Vendor
        </button>

    </form>

</div>
<div class="text-center mb-3 d-grid gap-2 d-md-block">
    <button class="btn btn-success" onclick="verifyAndDownload()">
    Download CSV
</button>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL =
"https://lfgdjpspaawgaltjvdag.supabase.co";

const SUPABASE_KEY =
"sb_publishable_iaGXvmD722n-wCGh5ovDTw_UcXkirpv";

const { createClient } = supabase;

const db = createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

let vendors = [];

// Form submit
document
.getElementById("vendorForm")
.addEventListener("submit", async function(e){
    e.preventDefault();
    const btn = document.querySelector("button[type='submit']");
btn.disabled = true;
btn.innerText = "Submitting...";
    const accountNumber =
document.getElementById("accountNumber").value.trim();

if (!/^\d+$/.test(accountNumber)) {
    alert("Bank Account Number must contain only numbers.");
    return;
}
    if (!this.checkValidity()) {
    this.reportValidity();
    return;
}

const mobile =
document.getElementById("mobile").value.trim();

const alternateMobile =
document.getElementById("alternateMobile").value.trim();

if (!/^\d{10}$/.test(mobile)) {
    alert("Mobile Number must contain exactly 10 digits.");
    return;
}

if (!/^\d{10}$/.test(alternateMobile)) {
    alert("Alternate Mobile Number must contain exactly 10 digits.");
    return;
}

const selectedServices = Array.from(
    document.querySelectorAll(".service-checkbox:checked")
).map(cb => cb.value);

if (selectedServices.length === 0) {
    alert("Please select at least one Service Category.");
    return;
}

const panFile = document.getElementById("panFile").files[0];
if (!panFile) {
    alert("PAN file is required");
    return;
}

let panUrl = "";

if (panFile) {

    const fileName =
    Date.now() + "_PAN_" + panFile.name;

    const { data, error } =
    await db.storage
        .from("vendor-documents")
        .upload(fileName, panFile);

    console.log("PAN Upload Data:", data);
    console.log("PAN Upload Error:", error);

    if (!error) {
        panUrl =
        `${SUPABASE_URL}/storage/v1/object/public/vendor-documents/${fileName}`;
    }
}

const gstFile = document.getElementById("gstFile").files[0];

let gstUrl = "";

if (gstFile) {

    const fileName =
    Date.now() + "_GST_" + gstFile.name;

    const { data, error } =
    await db.storage
        .from("vendor-documents")
        .upload(fileName, gstFile);

    console.log("GST Upload Data:", data);
    console.log("GST Upload Error:", error);

    if (!error) {
        gstUrl =
        `${SUPABASE_URL}/storage/v1/object/public/vendor-documents/${fileName}`;
    }
}

const agreementFile =
document.getElementById("agreementFile").files[0];
if (!agreementFile) {
    alert("Agreement file is required");
    return;
}

let agreementUrl = "";

if (agreementFile) {

    const fileName =
    Date.now() + "_AGREEMENT_" + agreementFile.name;

    const { error } =
    await db.storage
        .from("vendor-documents")
        .upload(fileName, agreementFile);

    if (!error) {

        agreementUrl =
        `${SUPABASE_URL}/storage/v1/object/public/vendor-documents/${fileName}`;
    }
}

    const vendorData = {

        vendor_name:
            document.getElementById("vendorName").value,

        contact_person:
    document.getElementById("contactPerson").value,

company_address:
    document.getElementById("companyAddress").value,

alternate_mobile:
    document.getElementById("alternateMobile").value,

        email:
            document.getElementById("email").value,

        mobile:
            document.getElementById("mobile").value,

        pan:
            document.getElementById("pan").value,

        gst:
            document.getElementById("gst").value,

        service:
    selectedServices,
    account_number:
    document.getElementById("accountNumber").value,

account_holder:
    document.getElementById("accountHolder").value,

agreement_file: agreementUrl,

agreement_date:
document.getElementById("agreementDate").value,

agreement_validity:
document.getElementById("agreementValidity").value,

bank_name:
    document.getElementById("bankName").value,

ifsc:
    document.getElementById("ifsc").value,
            pan_file: panUrl,

gst_file: gstUrl,
    };
    console.log("Vendor Data:", vendorData);

    const { data, error } = await db
    .from("vendors")
    .insert([vendorData])
    .select();

console.log("Inserted Data:", data);
console.log("Insert Error:", error);

    if (error) {

        console.error("Insert Error:", error);
        alert("Error saving vendor");
        btn.disabled = false;
    btn.innerText = "Register Vendor";

        return;
    }

    alert("Vendor Registered Successfully");

    this.reset();

    loadVendors();
    btn.disabled = false;
btn.innerText = "Register Vendor";
});
// CSV Download
async function verifyAndDownload() {

    const password = prompt(
        "Enter TMF Admin Password"
    );

    if (!password) {
        return;
    }

    if (password !== "TMF@2026") {
        alert("Incorrect Password");
        return;
    }

    downloadCSV();
}
async function downloadCSV() {

    const { data, error } = await db
        .from("vendors")
        .select("*")
        .order("id", { ascending: false });

    if (error) {
        console.error(error);
        alert("Failed to fetch data");
        return;
    }

    const vendors = data || [];

    let csv =
"ID,Vendor Name,Contact Person,Company Address,Email,Mobile,Alternate Mobile,PAN,GST,Service,Account Number,Account Holder,Bank Name,IFSC,Agreement Date,Agreement Validity,PAN File,GST File,Agreement File\n";

    vendors.forEach(v => {

        const row = [
    v.id,
    v.vendor_name,
    v.contact_person,
    v.company_address,
    v.email,
    v.mobile,
    v.alternate_mobile,
    `="${v.pan ?? ""}"`,
    v.gst,
    Array.isArray(v.service) ? v.service.join("; ") : v.service,
    v.account_number,
    v.account_holder,
    v.bank_name,
    v.ifsc,
    v.agreement_date,
    v.agreement_validity,
    v.pan_file,
    v.gst_file,
    v.agreement_file
]
        .map(v => (v ?? "").toString().replace(/"/g, '""')) // escape quotes
        .map(v => `"${v}"`)
        .join(",");

        csv += row + "\n";
    });

    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "vendors.csv";
    a.click();
}

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
