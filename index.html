<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Vendor Registration Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

/* Navbar Header */

.navbar-custom{
    background:#fff;
    border:none;
    border-radius:15px;
}

.logo{
    height:35px;
    width:auto;
}

.website-title{
    font-size:30px;
    font-weight:700;
    color:#212529;
    margin-bottom:5px;
}

.card{
    border:none;
    border-radius:15px;
}

.status-pending{
    color:#ff9800;
    font-weight:bold;
}

.status-approved{
    color:green;
    font-weight:bold;
}

.status-rejected{
    color:red;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container py-4">

<!-- Header -->

<div class="card shadow-sm navbar-custom p-3 mb-4">

    <div class="row align-items-center">

        <!-- Logo Left -->

        <div class="col-md-2 col-3">
            <img src="logo.png" class="logo" alt="Logo">
        </div>

        <!-- Heading Center -->

        <div class="col-md-8 col-6 text-center">

            <h1 class="website-title">
                Vendor Registration Portal
            </h1>

            <p class="text-muted mb-0">
                The Ma Foi Foundation
            </p>

        </div>

        <div class="col-md-2 col-3"></div>

    </div>

</div>

<!-- Registration Form -->

<div class="card shadow p-4 mb-4">

    <h4 class="mb-3">
        Vendor Registration
    </h4>

    <form id="vendorForm">

        <div class="row">

            <div class="col-md-6 mb-3">
                <label class="form-label">Vendor Name</label>
                <input type="text" class="form-control" id="vendorName" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Contact Person</label>
                <input type="text" class="form-control" id="contactPerson" required>
            </div>

            <div class="col-md-12 mb-3">
    <label class="form-label">Company Address</label>
    <textarea
        class="form-control"
        id="companyAddress"
        rows="3"
        required>
    </textarea>
</div>
            <div class="col-md-6 mb-3">
    <label class="form-label">Alternate Mobile Number</label>
    <input
        type="text"
        class="form-control"
        id="alternateMobile">
</div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="email">
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Mobile</label>
                <input type="text" class="form-control" id="mobile">
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">PAN Number</label>
                <input type="text" class="form-control" id="pan">
            </div>

            <div class="col-md-6 mb-3">
    <label class="form-label">PAN Card Upload</label>
    <input
        type="file"
        class="form-control"
        id="panFile"
        accept=".pdf,.jpg,.jpeg,.png">
</div>

            <div class="col-md-6 mb-3">
                <label class="form-label">GST Number</label>
                <input type="text" class="form-control" id="gst">
            </div>

            <div class="col-md-6 mb-3">
    <label class="form-label">GST Certificate Upload</label>
    <input
        type="file"
        class="form-control"
        id="gstFile"
        accept=".pdf,.jpg,.jpeg,.png">
</div>

            <div class="col-md-6 mb-3">

    <label class="form-label">Service Categories</label>

    <div class="dropdown">

        <button
            class="btn btn-outline-secondary dropdown-toggle w-100 text-start"
            type="button"
            data-bs-toggle="dropdown"
            aria-expanded="false">

            Select Service Categories

        </button>

        <ul class="dropdown-menu p-3 w-100">

            <li>
                <div class="form-check">
                    <input class="form-check-input service-checkbox"
                           type="checkbox"
                           value="Training Partner"
                           id="service1">
                    <label class="form-check-label" for="service1">
                        Training Partner
                    </label>
                </div>
            </li>

            <li>
                <div class="form-check">
                    <input class="form-check-input service-checkbox"
                           type="checkbox"
                           value="Mobilization Partner"
                           id="service2">
                    <label class="form-check-label" for="service2">
                        Mobilization Partner
                    </label>
                </div>
            </li>

            <li>
                <div class="form-check">
                    <input class="form-check-input service-checkbox"
                           type="checkbox"
                           value="Infrastructure Rental"
                           id="service3">
                    <label class="form-check-label" for="service3">
                        Infrastructure Rental
                    </label>
                </div>
            </li>

            <li>
                <div class="form-check">
                    <input class="form-check-input service-checkbox"
                           type="checkbox"
                           value="Domain Trainer"
                           id="service4">
                    <label class="form-check-label" for="service4">
                        Domain Trainer
                    </label>
                </div>
            </li>

            <li>
                <div class="form-check">
                    <input class="form-check-input service-checkbox"
                           type="checkbox"
                           value="Softskill Trainer"
                           id="service5">
                    <label class="form-check-label" for="service5">
                        Softskill Trainer
                    </label>
                </div>
            </li>

            <li>
                <div class="form-check">
                    <input class="form-check-input service-checkbox"
                           type="checkbox"
                           value="Recruitment Partner"
                           id="service6">
                    <label class="form-check-label" for="service6">
                        Recruitment Partner
                    </label>
                </div>
            </li>

            <li>
                <div class="form-check">
                    <input class="form-check-input service-checkbox"
                           type="checkbox"
                           value="Contract Employers"
                           id="service7">
                    <label class="form-check-label" for="service7">
                        Contract Employers
                    </label>
                </div>
            </li>

        </ul>

    </div>

</div>

            <div class="col-md-6 mb-3">

                <label class="form-label">Status</label>

                <select class="form-select" id="status">

                    <option>Pending</option>
                    <option>Approved</option>
                    <option>Rejected</option>

                </select>

            </div>

        </div>
        <hr class="my-4">

<h5>Bank Details</h5>

<div class="row">

    <div class="col-md-6 mb-3">
        <label class="form-label">Bank Account Number</label>
        <input type="text" class="form-control" id="accountNumber">
    </div>

    <div class="col-md-6 mb-3">
        <label class="form-label">Account Holder Name</label>
        <input type="text" class="form-control" id="accountHolder">
    </div>

    <div class="col-md-6 mb-3">
        <label class="form-label">Bank Name</label>
        <input type="text" class="form-control" id="bankName">
    </div>

    <div class="col-md-6 mb-3">
        <label class="form-label">IFSC Code</label>
        <input type="text" class="form-control" id="ifsc">
    </div>

</div>

        <button type="submit" class="btn btn-primary">
            Register Vendor
        </button>

    </form>

</div>

<!-- Vendor List -->

<div class="card shadow p-4">

    <div class="row mb-3">

        <div class="col-md-6">

            <input
                type="text"
                id="searchVendor"
                class="form-control"
                placeholder="Search Vendor">

        </div>

        <div class="col-md-6 text-end">

            <button
                class="btn btn-success"
                onclick="downloadCSV()">

                Download CSV

            </button>

        </div>

    </div>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">

            <tr>

                <th>ID</th>
                <th>Vendor</th>
                <th>Contact Person</th>
                <th>Service</th>
                <th>Status</th>

            </tr>

        </thead>

        <tbody id="vendorTable">

        </tbody>

    </table>

</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL =
"https://lfgdjpspaawgaltjvdag.supabase.co";

const SUPABASE_KEY =
"sb_publishable_iaGXvmD722n-wCGh5ovDTw_UcXkirpv";

const { createClient } = supabase;

const db = createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

let vendors = [];

// Load vendors from Supabase
async function loadVendors() {

    const { data, error } = await db
        .from("vendors")
        .select("*")
        .order("id", { ascending: false });

    if (error) {
        console.error("Load Error:", error);
        return;
    }

    vendors = data || [];
    renderTable();
}

// Render table
function renderTable() {

    let html = "";

    vendors.forEach(v => {

        let cls = "";

        if (v.status === "Pending")
            cls = "status-pending";

        if (v.status === "Approved")
            cls = "status-approved";

        if (v.status === "Rejected")
            cls = "status-rejected";

        html += `
        <tr>
            <td>${v.id}</td>
            <td>${v.vendor_name}</td>
            <td>${v.contact_person}</td>
            <td>${
    Array.isArray(v.service)
        ? v.service.join(", ")
        : v.service
}</td>
            <td class="${cls}">${v.status}</td>
        </tr>
        `;
    });

    document.getElementById("vendorTable").innerHTML = html;
}

// Form submit
document
.getElementById("vendorForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const selectedServices = Array.from(
    document.querySelectorAll(".service-checkbox:checked")
).map(cb => cb.value);

const panFile = document.getElementById("panFile").files[0];

let panUrl = "";

if (panFile) {

    const fileName =
    Date.now() + "_PAN_" + panFile.name;

    const { data, error } =
    await db.storage
        .from("vendor-documents")
        .upload(fileName, panFile);

    console.log("PAN Upload Data:", data);
    console.log("PAN Upload Error:", error);

    if (!error) {
        panUrl =
        `${SUPABASE_URL}/storage/v1/object/public/vendor-documents/${fileName}`;
    }
}

const gstFile = document.getElementById("gstFile").files[0];

let gstUrl = "";

if (gstFile) {

    const fileName =
    Date.now() + "_GST_" + gstFile.name;

    const { data, error } =
    await db.storage
        .from("vendor-documents")
        .upload(fileName, gstFile);

    console.log("GST Upload Data:", data);
    console.log("GST Upload Error:", error);

    if (!error) {
        gstUrl =
        `${SUPABASE_URL}/storage/v1/object/public/vendor-documents/${fileName}`;
    }
}

    const vendorData = {

        vendor_name:
            document.getElementById("vendorName").value,

        contact_person:
    document.getElementById("contactPerson").value,

company_address:
    document.getElementById("companyAddress").value,

alternate_mobile:
    document.getElementById("alternateMobile").value,

        email:
            document.getElementById("email").value,

        mobile:
            document.getElementById("mobile").value,

        pan:
            document.getElementById("pan").value,

        gst:
            document.getElementById("gst").value,

        service:
    selectedServices,
    account_number:
    document.getElementById("accountNumber").value,

account_holder:
    document.getElementById("accountHolder").value,

bank_name:
    document.getElementById("bankName").value,

ifsc:
    document.getElementById("ifsc").value,

        status:
            document.getElementById("status").value,
            pan_file: panUrl,

gst_file: gstUrl,
    };
    console.log("Vendor Data:", vendorData);

    const { error } = await db
        .from("vendors")
        .insert([vendorData]);

    if (error) {

        console.error("Insert Error:", error);
        alert("Error saving vendor");

        return;
    }

    alert("Vendor Registered Successfully");

    this.reset();

    loadVendors();
});

// Search
document
.getElementById("searchVendor")
.addEventListener("keyup", function(){

    let value = this.value.toLowerCase();

    let rows =
    document.querySelectorAll("#vendorTable tr");

    rows.forEach(r => {

        r.style.display =
        r.innerText.toLowerCase().includes(value)
        ? ""
        : "none";
    });

});

// CSV Download
function downloadCSV(){

    let csv =
    "VendorID,Vendor,Contact Person,Service,Status\n";

    vendors.forEach(v => {

        csv +=
        `${v.id},${v.vendor_name},${v.contact_person},${v.service},${v.status}\n`;

    });

    let blob = new Blob(
        [csv],
        { type:"text/csv" }
    );

    let url =
    window.URL.createObjectURL(blob);

    let a =
    document.createElement("a");

    a.href = url;
    a.download = "vendors.csv";
    a.click();
}

// Initial load
loadVendors();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
